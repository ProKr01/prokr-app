<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arise</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">

    <header class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-black">ARISE ⚔️</h1>
      <div class="text-right">
        <div class="text-emerald-400 text-2xl" id="level">Lv. --</div>
        <div id="xp">-- XP</div>
      </div>
    </header>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
      <p class="text-zinc-400">Hunter</p>
      <p id="name" class="text-2xl font-bold">ProKr</p>
      <p class="text-orange-400">🔥 7 day streak</p>
    </div>

    <div class="space-y-4">
      <button onclick="completeQuest()" class="w-full bg-zinc-800 p-6 rounded-3xl text-left text-lg">🏆 Daily Quest (+50 XP)</button>
      <button onclick="logWorkout()" class="w-full bg-zinc-800 p-6 rounded-3xl text-left text-lg">🏋️ Log Workout (+35 XP)</button>
      <button onclick="showExercises()" class="w-full bg-zinc-800 p-6 rounded-3xl text-left text-lg">📋 Exercise Library</button>
      <button onclick="generatePlan()" class="w-full bg-gradient-to-r from-purple-500 to-blue-500 p-6 rounded-3xl text-xl font-bold">✨ Generate Personalized Plan</button>
    </div>
  </div>

  <script>
    // Live Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAWSur-nZd-X4qZrk2ijd8sne7c5EFuOyM",
      authDomain: "prokr-896fc.firebaseapp.com",
      databaseURL: "https://prokr-896fc-default-rtdb.firebaseio.com",
      projectId: "prokr-896fc",
      storageBucket: "prokr-896fc.firebasestorage.app",
      messagingSenderId: "305648872940",
      appId: "1:305648872940:web:c7b0f212d9b7b0f167a4c9"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Application state variables
    let xp = 0, level = 1;
    const userDbRef = database.ref("users/ProKr");

    // 1. Listen for Realtime database updates
    function initDatabaseListener() {
      userDbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          xp = data.xp !== undefined ? data.xp : 0;
          level = data.level !== undefined ? data.level : 1;
          updateUI();
        } else {
          // Fallback if the user profile doesn't exist yet in your DB root
          xp = 245;
          level = 1;
          updateUI();
          saveUserData(xp, level);
        }
      }, (error) => {
        console.error("Database read failed: ", error);
        // Clean local defaults fallback if rule permissions block it initially
        xp = 245;
        level = 1;
        updateUI();
      });
    }

    // 2. Save tracking state back to Firebase
    function saveUserData(currentXp, currentLevel) {
      userDbRef.set({
        xp: currentXp,
        level: currentLevel
      }).catch((error) => console.error("Database save failed: ", error));
    }

    function updateUI() {
      document.getElementById('xp').textContent = xp + " XP";
      document.getElementById('level').textContent = "Lv. " + level;
    }

    function addXp(amount) {
      xp += amount;
      if (xp >= level * 120) { 
        level++; 
        xp = 0; 
        alert("🎉 LEVEL UP!"); 
      }
      updateUI();
      saveUserData(xp, level);
    }

    function completeQuest() {
      addXp(50);
      alert("Quest Complete!");
    }

    function logWorkout() {
      addXp(35);
      alert("Workout Logged!");
    }

    function showExercises() {
      alert("Exercise Library:\n\n1. Push-ups - 3 sets\n2. Squats - 4 sets\n3. Plank - 45 seconds\n\nLog them using the buttons above.");
    }

    function generatePlan() {
      alert("🧠 Personalized Plan Ready!\n\nPush Day Focus");
    }

    // Spin up the sync link
    initDatabaseListener();
  </script>
</body>
</html>
